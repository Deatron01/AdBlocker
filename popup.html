<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdBlock Stats</title>

    <style>
        body {
            width: 250px;
            padding: 16px;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
        }

        .card {
            background: #1f2937;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .title {
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .counter {
            font-size: 42px;
            color: #22c55e;
            font-weight: bold;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 13px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">
            🛡️ Blokkolt reklámok
        </div>

        <div id="blockedCount" class="counter">
            0
        </div>

        <div class="subtitle">
            Dinamikus reklámblokkolás aktív
        </div>
    </div>

    <script src="popup.js"></script>

</body>
</html>
