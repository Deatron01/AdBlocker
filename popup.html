<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Adblocker Irányítópult</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 250px;
            padding: 15px;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
        }
        h2 {
            font-size: 16px;
            margin-top: 0;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        .status {
            font-weight: bold;
            color: #4CAF50; /* Zöld, ha aktív */
        }
        .status.disabled {
            color: #F44336; /* Piros, ha inaktív */
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #005f9e;
        }
    </style>
</head>
<body>
    <h2>Irányítópult</h2>
    <p>Állapot: <span id="statusText" class="status">Aktív</span></p>
    <button id="toggleBtn">Blokkolás kikapcsolása</button>

    <script src="popup.js"></script>
</body>
</html>
